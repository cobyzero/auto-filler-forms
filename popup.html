<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Fake Form Filler Config</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo-area">
        <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 21l8.982-11.761a.75.75 0 00-.616-1.218H14.25L15 3 6.018 14.761a.75.75 0 00.616 1.218h4.179z" />
        </svg>
        <span class="logo-text">FakeFiller <span class="badge">Auto</span></span>
      </div>
    </header>

    <!-- Settings Body -->
    <main class="settings-main">
      
      <!-- Option: Activation Trigger -->
      <div class="setting-group">
        <label class="group-title">¿Cuándo rellenar?</label>
        <div class="segmented-control">
          <input type="radio" name="trigger" id="trigger-auto" value="auto" checked>
          <label for="trigger-auto" class="segment-label">
            <svg class="segment-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
            Al cargar
          </label>
          
          <input type="radio" name="trigger" id="trigger-manual" value="manual">
          <label for="trigger-manual" class="segment-label">
            <svg class="segment-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
            </svg>
            Manual
          </label>
          <div class="slider slider-2"></div>
        </div>
      </div>

      <!-- Option: Behavior Mode -->
      <div class="setting-group">
        <label class="group-title">¿Qué acción realizar?</label>
        <div class="segmented-control">
          <input type="radio" name="action-mode" id="action-fill" value="fill">
          <label for="action-fill" class="segment-label">
            <svg class="segment-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z" />
            </svg>
            Solo rellenar
          </label>
          
          <input type="radio" name="action-mode" id="action-submit" value="submit" checked>
          <label for="action-submit" class="segment-label">
            <svg class="segment-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
            Rellenar y enviar
          </label>
          <div class="slider slider-2"></div>
        </div>
      </div>

      <!-- Option: Loop Switch -->
      <div class="setting-item flex-between" id="loop-container">
        <div class="setting-info">
          <span class="setting-title">Modo Bucle</span>
          <span class="setting-desc">Enviar otra respuesta en bucle continuo</span>
        </div>
        <label class="switch">
          <input type="checkbox" id="loop-mode" checked>
          <span class="switch-slider"></span>
        </label>
      </div>
      <!-- Option: Loop Limit -->
      <div class="setting-item flex-between" id="loop-limit-container">
        <div class="setting-info">
          <span class="setting-title">Límite de envíos</span>
          <span class="setting-desc">Número de veces (0 para infinito)</span>
        </div>
        <div class="option-input-wrap">
          <input type="number" id="loop-limit" min="0" value="0" class="option-input">
        </div>
      </div>
      <!-- Dynamic Questions section -->
      <div class="setting-group" id="questions-section">
        <label class="group-title">Probabilidades de Respuestas</label>
        <div id="dynamic-questions-container" class="questions-list">
          <div class="no-questions">Cargando preguntas del formulario...</div>
        </div>
      </div>

    </main>

    <!-- Bottom Actions -->
    <footer class="footer">
      <div class="backup-actions">
        <button id="export-btn" class="secondary-btn" title="Exportar Configuración">
          <svg class="btn-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
          </svg>
          Exportar
        </button>
        <button id="import-btn" class="secondary-btn" title="Importar Configuración">
          <svg class="btn-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12" />
          </svg>
          Importar
        </button>
        <input type="file" id="import-file-input" style="display: none;" accept=".json">
      </div>
      <button id="fill-now-btn" class="primary-btn">
        <span>Iniciar</span>
        <svg class="btn-icon" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14 5l7 7m0 0l-7 7m7-7H3" />
        </svg>
      </button>
      <div id="status-message" class="status-text">Guardado automáticamente</div>
    </footer>
  </div>
  <script src="popup.js"></script>
</body>
</html>
